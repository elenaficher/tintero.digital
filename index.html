document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 body{margin:0;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Lora',Georgia,serif;color:#1a1a18;line-height:1.6;background:#fff;min-height:100vh;width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\">\n\n<!-- ════════ LANDING ════════ -->\n<sc-if value=\"{{ isLanding }}\" hint-placeholder-val=\"{{ true }}\">\n<div>\n  <nav style=\"display:flex;align-items:center;justify-content:space-between;padding:1.1rem clamp(1.25rem,4vw,2.5rem);border-bottom:0.5px solid rgba(26,26,24,0.12);background:#fff;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;\">\n    <div onclick=\"{{ goLanding }}\" style=\"font-family:'Playfair Display',serif;font-size:20px;display:flex;align-items:center;gap:8px;cursor:pointer;\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:#3C3489;\"><\u002Fspan>tintero\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;\">\n      <button onclick=\"{{ goPerfil }}\" style=\"font-size:13px;font-style:italic;color:#6b6b65;cursor:pointer;background:none;border:none;font-family:'Lora',serif;\">explorar<\u002Fbutton>\n      <button onclick=\"{{ goDashboard }}\" style=\"font-size:13px;font-family:'Lora',serif;color:#fff;background:#3C3489;border:none;padding:7px 18px;border-radius:20px;cursor:pointer;\" style-hover=\"background:#26215C;\">crear mi perfil<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,420px),1fr));border-bottom:0.5px solid rgba(26,26,24,0.12);\">\n    <div style=\"padding:clamp(2.5rem,6vw,5rem) clamp(1.5rem,4vw,3rem) clamp(2.5rem,5vw,4rem);display:flex;flex-direction:column;justify-content:center;border-right:0.5px solid rgba(26,26,24,0.12);\">\n      <p style=\"font-size:11px;letter-spacing:2px;color:#534AB7;font-style:italic;margin:0 0 1.5rem;\">portfolio para escritores<\u002Fp>\n      <h1 style=\"font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,52px);font-weight:400;line-height:1.08;letter-spacing:-1px;margin:0 0 1.5rem;\">Tu obra merece<br>un <em style=\"font-style:italic;color:#534AB7;\">lugar propio.<\u002Fem><\u002Fh1>\n      <p style=\"font-size:16px;line-height:1.8;color:#6b6b65;max-width:440px;margin:0 0 2.5rem;\">Tintero es el portfolio que los escritores siempre necesitaron. Mostrá tu trabajo, contá quién sos, y que te encuentren editores, lectores y colegas.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n        <button onclick=\"{{ goDashboard }}\" style=\"font-family:'Lora',serif;font-size:14px;color:#fff;background:#3C3489;border:none;padding:11px 24px;border-radius:24px;cursor:pointer;\" style-hover=\"background:#26215C;\">crear mi perfil gratis<\u002Fbutton>\n        <button onclick=\"{{ goPerfil }}\" style=\"font-family:'Lora',serif;font-size:14px;font-style:italic;color:#6b6b65;background:none;border:0.5px solid rgba(26,26,24,0.22);padding:11px 20px;border-radius:24px;cursor:pointer;\" style-hover=\"border-color:#AFA9EC;color:#534AB7;\">explorar escritores →<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin:1.5rem 0 0;font-size:12px;color:#9e9e96;font-style:italic;\">Sin costo. Sin algoritmos. Solo tu escritura.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"background:#f2f0eb;display:flex;align-items:center;justify-content:center;padding:clamp(2rem,4vw,3rem) clamp(1.5rem,3vw,2.5rem);position:relative;overflow:hidden;min-height:420px;\">\n      <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(26,26,24,0.12) 0.5px,transparent 0.5px),linear-gradient(90deg,rgba(26,26,24,0.12) 0.5px,transparent 0.5px);background-size:40px 40px;\"><\u002Fdiv>\n      <div style=\"background:#fff;border:0.5px solid rgba(26,26,24,0.12);border-radius:8px;width:100%;max-width:340px;overflow:hidden;position:relative;z-index:1;box-shadow:0 4px 32px rgba(0,0,0,0.08);\">\n        <div style=\"padding:1.25rem;border-bottom:0.5px solid rgba(26,26,24,0.12);display:flex;gap:12px;align-items:flex-start;\">\n          <div style=\"width:48px;height:48px;border-radius:3px;background:#EEEDFE;border:0.5px solid #AFA9EC;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;color:#3C3489;flex-shrink:0;\">VF<\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Playfair Display',serif;font-size:15px;margin-bottom:2px;\">Valentina Ferrante<\u002Fdiv>\n            <div style=\"font-size:12px;color:#534AB7;font-style:italic;\">Narradora · Buenos Aires<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"margin-left:auto;font-size:10px;font-style:italic;background:#EAF3DE;border:0.5px solid #639922;color:#3B6D11;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;\">acepta encargos<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:1rem 1.25rem;font-size:12px;line-height:1.7;color:#6b6b65;border-bottom:0.5px solid rgba(26,26,24,0.12);\">Escritora de ficción y ensayo. Interesada en los bordes del lenguaje y la memoria colectiva.<\u002Fdiv>\n        <div style=\"padding:0.75rem 1.25rem;\">\n          <div style=\"font-size:10px;letter-spacing:1px;color:#6b6b65;font-style:italic;margin-bottom:10px;\">publicaciones<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:0.5px solid rgba(26,26,24,0.12);\">\n            <div style=\"width:28px;height:36px;border-radius:2px;background:#EEEDFE;border:0.5px solid #AFA9EC;flex-shrink:0;\"><\u002Fdiv>\n            <div><div style=\"font-family:'Playfair Display',serif;font-size:12px;\">Las horas que no recordamos<\u002Fdiv><div style=\"font-size:10px;color:#6b6b65;font-style:italic;\">novela · 2023 · Eterna Cadencia<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:0.5px solid rgba(26,26,24,0.12);\">\n            <div style=\"width:28px;height:36px;border-radius:2px;background:#FAEEDA;border:0.5px solid #FAC775;flex-shrink:0;\"><\u002Fdiv>\n            <div><div style=\"font-family:'Playfair Display',serif;font-size:12px;\">El idioma de las ausencias<\u002Fdiv><div style=\"font-size:10px;color:#6b6b65;font-style:italic;\">ensayo · 2021 · Anagrama<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:center;padding:7px 0;\">\n            <div style=\"width:28px;height:36px;border-radius:2px;background:#E1F5EE;border:0.5px solid #5DCAA5;flex-shrink:0;\"><\u002Fdiv>\n            <div><div style=\"font-family:'Playfair Display',serif;font-size:12px;\">Mapa sin norte<\u002Fdiv><div style=\"font-size:10px;color:#6b6b65;font-style:italic;\">novela · 2019 · Tusquets<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:clamp(3rem,5vw,5rem) clamp(1.5rem,4vw,3rem);border-bottom:0.5px solid rgba(26,26,24,0.12);\">\n    <p style=\"font-size:11px;letter-spacing:2px;color:#534AB7;font-style:italic;margin:0 0 3rem;\">por qué tintero<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr));gap:0;\">\n      <div style=\"padding:2rem clamp(1.5rem,3vw,2.5rem) 2rem 0;border-right:0.5px solid rgba(26,26,24,0.12);\">\n        <div style=\"font-family:'Playfair Display',serif;font-size:36px;color:#AFA9EC;line-height:1;padding-bottom:1rem;margin-bottom:1rem;border-bottom:0.5px solid rgba(26,26,24,0.12);\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:400;margin:0 0 10px;\">Un perfil que habla de vos<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.75;color:#6b6b65;margin:0;\">Nombre, bio, contacto y obras en un solo lugar. Sin ruido, sin distracciones. El foco está en tu escritura.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:2rem clamp(1.5rem,3vw,2.5rem);border-right:0.5px solid rgba(26,26,24,0.12);\">\n        <div style=\"font-family:'Playfair Display',serif;font-size:36px;color:#AFA9EC;line-height:1;padding-bottom:1rem;margin-bottom:1rem;border-bottom:0.5px solid rgba(26,26,24,0.12);\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:400;margin:0 0 10px;\">Todas tus obras reunidas<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.75;color:#6b6b65;margin:0;\">Libros, ensayos, cuentos, poemarios, crónicas. Cada publicación con portada, año, editorial y enlace. Un archivo vivo de tu trabajo.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:2rem 0 2rem clamp(1.5rem,3vw,2.5rem);\">\n        <div style=\"font-family:'Playfair Display',serif;font-size:36px;color:#AFA9EC;line-height:1;padding-bottom:1rem;margin-bottom:1rem;border-bottom:0.5px solid rgba(26,26,24,0.12);\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:400;margin:0 0 10px;\">Que te encuentren<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.75;color:#6b6b65;margin:0;\">Editoriales, lectores y colaboradores buscan escritores en Tintero. Activá tu disponibilidad y abrí la puerta.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:clamp(3rem,5vw,5rem) clamp(1.5rem,4vw,3rem);border-bottom:0.5px solid rgba(26,26,24,0.12);background:#f8f7f4;\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2.5rem;gap:12px;flex-wrap:wrap;\">\n      <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,28px);font-weight:400;font-style:italic;margin:0;\">Escritores en Tintero<\u002Fh2>\n      <button onclick=\"{{ goPerfil }}\" style=\"font-size:13px;font-style:italic;color:#534AB7;cursor:pointer;background:none;border:none;font-family:'Lora',serif;\">ver todos →<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:re ntes de dormir.' },\n        { title:'Botón, el gato cartógrafo', type:'álbum', year:2019, pub:'Fondo de Cultura Económica', desc:'Las aventuras de un gato que dibuja mapas secretos de la ciudad.' },\n      ],\n    },\n  ];\n\n  go(screen){ this.setState({ screen }); if (typeof window !== 'undefined') window.scrollTo(0,0); }\n  openWriter(id){ this.setState({ screen:'perfil', activeWriterId:id, filter:'todos' }); if (typeof window !== 'undefined') window.scrollTo(0,0); }\n\n  componentDidMount(){\n    const p = this.props.escritorInicial;\n    if (p && p !== this.state.activeWriterId && this.WRITERS.some(w=>w.id===p)) this.setState({ activeWriterId:p });\n  }\n  componentDidUpdate(prev){\n    const p = this.props.escritorInicial;\n    if (prev.escritorInicial !== p && p && this.WRITERS.some(w=>w.id===p)) this.setState({ activeWriterId:p });\n  }\n\n  renderVals(){\n    const st = this.state;\n    const showBadges = this.props.mostrarBadgesEstado !== false;\n    const tabLabel = (t)=>({ 'novela':'novelas','ensayo':'ensayos','cuento':'cuentos','poemario':'poesía','crónica':'crónicas','dramaturgia':'teatro','álbum':'álbumes','infantil':'infantiles','artículo':'artículos' }[t] || t);\n\n    const aw0 = this.WRITERS.find(w=>w.id===st.activeWriterId) || this.WRITERS[0];\n    const f = st.filter;\n    const awWorks = aw0.works\n      .filter(w => f==='todos' || w.type===f)\n      .map(w => {\n        const p = this.pal(w.type);\n        return { title:w.title, type:w.type, desc:w.desc, award:w.award||'', hasAward:!!w.award,\n          meta: w.year + ' · ' + w.pub, bg:p.bg, fg:p.fg, bd:p.bd, cover:p.cover };\n      });\n\n    const types = [...new Set(aw0.works.map(w=>w.type))];\n    const profileTabs = [{ key:'todos', label:'todos' }, ...types.map(t=>({ key:t, label:tabLabel(t) }))]\n      .map(tb => ({ label:tb.label,\n        select: ()=>this.setState({ filter:tb.key }),\n        style: (tb.key===f) ? 'color:#3C3489;border-bottom-color:#3C3489;font-style:normal;' : 'color:#6b6b65;border-bottom-color:transparent;font-style:italic;' }));\n\n    const aw = {\n      initials:aw0.initials, name:aw0.name, tagline:aw0.tagline, bio:aw0.bio,\n      avBg:aw0.avBg, avFg:aw0.avFg, avBd:aw0.avBd,\n      available:aw0.available, hasAvailable: !!aw0.available, building: !!aw0.building,\n      stats:[{ num:aw0.stats.pubs, label:'publicaciones' }, { num:aw0.stats.books, label:'libros' }, { num:aw0.stats.since, label:'trayectoria' }],\n      contacts:(aw0.contacts||[]).map(c=>({ text:c })), hasContacts:(aw0.contacts||[]).length>0,\n    };\n\n    const gridWriters = this.WRITERS.map(w=>({\n      initials:w.initials, name:w.name, genreShort:w.genreShort, avBg:w.avBg, avFg:w.avFg,\n      countLabel: w.stats.pubs + (w.stats.pubs===1 ? ' publicación' : ' publicaciones'),\n      showBadge: !!w.building && showBadges,\n      open: ()=>this.openWriter(w.id),\n    }));\n\n    const val = this.WRITERS.find(w=>w.id==='valentina');\n    const valWorks = val.works.map(w=>{ const p=this.pal(w.type); return { title:w.title, type:w.type, metaDash: w.year + ' · ' + w.pub, bg:p.bg, fg:p.fg, bd:p.bd, cover:p.cover }; });\n\n    const T = st.toggles;\n    const toggles = [\n      { key:'encargos', label:'Acepto encargos', sub:'Aparece un sello en tu perfil público', on:T.encargos },\n      { key:'colab', label:'Disponible para colaboraciones', sub:'Otros escritores pueden contactarte para proyectos conjuntos', on:T.colab },\n      { key:'visible', label:'Perfil visible al público', sub:'Si está desactivado, tu perfil solo lo ves vos', on:T.visible },\n    ].map(t=>({ label:t.label, sub:t.sub,\n      trackStyle: t.on ? 'background:#534AB7;' : 'background:rgba(26,26,24,0.22);',\n      knobStyle: t.on ? 'left:19px;' : 'left:3px;',\n      toggle: ()=>this.setState(s=>({ toggles:{ ...s.toggles, [t.key]: !s.toggles[t.key] } })) }));\n\n    const mkSide = (key)=>({\n      select: ()=>this.setState({ dashSection:key }),\n      style: (st.dashSection===key) ? 'color:#3C3489;border-left-color:#3C3489;background:#EEEDFE;font-style:normal;' : 'color:#6b6b65;border-left-color:transparent;background:transparent;font-style:italic;',\n    });\n\n    return {\n      isLanding: st.screen==='landing',\n      isPerfil: st.screen==='perfil',\n      isDashboard: st.screen==='dashboard',\n      goLanding: ()=>this.go('landing'),\n      goPerfil: ()=>this.openWriter('valentina'),\n      goPerfilVal: ()=>this.openWriter('valentina'),\n      goDashboard: ()=>this.go('dashboard'),\n      aw, awWorks, worksEmpty: awWorks.length===0, profileTabs,\n      gridWriters,\n      valWorks, valWorksCount: valWorks.length,\n      toggles,\n      side: { perfil: mkSide('perfil'), obras: mkSide('obras'), disponibilidad: mkSide('disponibilidad') },\n      showPerfilSec: st.dashSection==='perfil',\n      showObrasSec: st.dashSection==='obras',\n      showDispSec: st.dashSection==='disponibilidad',\n      modalOpen: st.modalOpen,\n      openModal: ()=>this.setState({ modalOpen:true }),\n      closeModal: ()=>this.setState({ modalOpen:false }),\n      closeModalBg: (e)=>{ if (e && e.target===e.currentTarget) this.setState({ modalOpen:false }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
